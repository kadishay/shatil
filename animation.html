<head>
    <meta charset="UTF-8">

    <title>Shatil - Photo Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(30deg, #193e16 0%, #2d5a28 40%, #4a7a3f 70%, #8B7355 100%);
            height: 100vh;
            overflow: hidden;
        }


        .photo {
            position: absolute;
            background: linear-gradient(145deg, #faf8f3 0%, #f5f0e6 50%, #ebe5d9 100%);
            padding: 10px 10px 40px 10px;
            border-radius: 2px;
            box-shadow:
                0 20px 60px rgba(0,0,0,0.5),
                0 8px 25px rgba(0,0,0,0.3),
                0 3px 8px rgba(0,0,0,0.2),
                inset 0 0 0 1px rgba(0,0,0,0.08),
                inset 0 1px 3px rgba(255,255,255,0.5);
            transform-origin: center center;
            will-change: transform, top, opacity;
        }

        .photo::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(ellipse at 20% 80%, rgba(139,119,101,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(139,119,101,0.05) 0%, transparent 40%),
                radial-gradient(ellipse at 90% 90%, rgba(0,0,0,0.03) 0%, transparent 30%);
            pointer-events: none;
            border-radius: 2px;
        }

        .photo::after {
            content: '';
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 50%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0,0,0,0.06), transparent);
        }

        .photo img {
            max-width: 500px;
            max-height: 400px;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
            filter: saturate(0.95) contrast(1.02) sepia(0.05);
            border-radius: 1px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
        }

        .photo.falling {
            animation: fall var(--fall-duration) cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes fall {
            0% {
                top: -250px;
                opacity: 0;
                transform: rotate(var(--start-rot)) scale(0.3);
            }
            10% {
                opacity: 1;
                transform: rotate(var(--start-rot)) scale(0.8);
            }
            60% {
                transform: rotate(var(--mid-rot)) scale(1);
            }
            80% {
                top: var(--end-top);
                transform: rotate(var(--end-rot)) scale(1.02);
            }
            90% {
                transform: rotate(var(--end-rot)) scale(0.98);
            }
            100% {
                top: var(--end-top);
                transform: rotate(var(--end-rot)) scale(1);
                opacity: 1;
            }
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 1rem;
            padding: 12px 24px;
            cursor: pointer;
            border-radius: 30px;
            z-index: 1000;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.25);
            transform: scale(1.05);
        }

        .title {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
        }

        .title img {
            height: 60px;
            filter: drop-shadow(0 0 8px white) drop-shadow(0 0 15px white) drop-shadow(0 0 25px rgba(255,255,255,0.5));
        }

        .counter {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            z-index: 1000;
        }

        .ambient-light {
            position: fixed;
            top: -50%;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, rgba(255,200,100,0.1) 0%, transparent 60%);
            pointer-events: none;
        }
    </style>
</head>

            "More/Shatil_More_165.jpeg"
        ];

        // Clear old cached data and use default images
        localStorage.removeItem('shatil-image-order');
        const images = defaultImages;

        document.getElementById('total').textContent = images.length;

        let photoCount = 0;
        const maxPhotos = 25;

        // Shuffle array function
        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        let shuffledImages = shuffleArray(images);
        let currentIndex = 0;

        function createPhoto(imgSrc) {
            const photo = document.createElement('div');
            photo.className = 'photo falling';

            const img = document.createElement('img');
            img.src = imgSrc;
            photo.appendChild(img);

            // Random values
            const startRot = (Math.random() - 0.5) * 90;
            const midRot = (Math.random() - 0.5) * 40;
            const endRot = (Math.random() - 0.5) * 35;
            const leftPos = -5 + Math.random() * 95;
            const endTop = 5 + Math.random() * 75;
            const fallDuration = 2.5 + Math.random() * 0.8;

            photo.style.left = leftPos + '%';
            photo.style.zIndex = photoCount;
            photo.style.setProperty('--start-rot', startRot + 'deg');
            photo.style.setProperty('--mid-rot', midRot + 'deg');
            photo.style.setProperty('--end-rot', endRot + 'deg');
            photo.style.setProperty('--end-top', endTop + '%');
            photo.style.setProperty('--fall-duration', fallDuration + 's');

            document.body.appendChild(photo);
            photoCount++;

            // Remove old photos
            const photos = document.querySelectorAll('.photo');
            if (photos.length > maxPhotos) {
                photos[0].style.transition = 'opacity 0.3s';
                photos[0].style.opacity = '0';
                setTimeout(() => photos[0].remove(), 300);
            }
        }

        function dropPhoto() {
            createPhoto(shuffledImages[currentIndex]);
            document.getElementById('count').textContent = currentIndex + 1;
            currentIndex++;
            if (currentIndex >= shuffledImages.length) {
                currentIndex = 0;
                shuffledImages = shuffleArray(images);
            }
        }

        // Get speed from URL param (default 2000ms)
        const urlParams = new URLSearchParams(window.location.search);
        const speed = parseInt(urlParams.get('speed')) || 2000;

        // Start dropping photos
        dropPhoto();
        setInterval(dropPhoto, speed);
