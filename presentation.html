<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shatil - Photo Presentation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: white;
            height: 100vh;
            overflow: hidden;
        }

        .slideshow-container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
            padding: 60px 80px;
            opacity: 0;
            transform: translateY(-100%) rotate(-5deg);
            transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            pointer-events: none;
            display: flex;
        }

        .slide.active {
            opacity: 1;
            transform: translateY(0) rotate(0deg);
            pointer-events: auto;
            z-index: 2;
        }

        .slide.underneath {
            opacity: 1;
            transform: translateY(0) rotate(0deg);
            z-index: 1;
        }

        .slide img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            font-size: 2rem;
            padding: 20px 15px;
            cursor: pointer;
            transition: background 0.3s;
            z-index: 10;
        }

        .nav-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .nav-btn.prev {
            left: 20px;
        }

        .nav-btn.next {
            right: 20px;
        }

        .slide-counter {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 1rem;
            z-index: 100;
        }

        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 4px;
            background: #4CAF50;
            transition: width 0.3s ease;
        }

        .instructions {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.85rem;
            opacity: 0.7;
        }

        .fullscreen-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            font-size: 1.2rem;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.3s;
            z-index: 1000;
        }

        .fullscreen-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .animation-btn {
            position: fixed;
            top: 20px;
            right: 80px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            font-size: 1.2rem;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.3s;
            z-index: 1000;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .animation-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .animation-btn.active {
            background: #4CAF50;
        }

        /* Animation Mode Styles */
        .animation-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #2c1810 0%, #4a3728 50%, #6b4423 100%);
            z-index: 1000;
            overflow: hidden;
        }

        .animation-overlay.active {
            display: block;
        }

        .table-surface {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70%;
            background: linear-gradient(180deg, #8B5A2B 0%, #654321 100%);
            box-shadow: inset 0 10px 30px rgba(0,0,0,0.3);
        }

        .table-surface::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 100px,
                rgba(0,0,0,0.05) 100px,
                rgba(0,0,0,0.05) 102px
            );
        }

        .falling-photo {
            position: absolute;
            background: white;
            padding: 10px 10px 30px 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            animation: fallAndLand 2s ease-out forwards;
            transform-origin: center center;
        }

        .falling-photo img {
            width: 200px;
            height: 150px;
            object-fit: cover;
            display: block;
        }

        @keyframes fallAndLand {
            0% {
                top: -300px;
                opacity: 0;
                transform: rotate(var(--start-rotation)) scale(0.5);
            }
            20% {
                opacity: 1;
            }
            70% {
                top: var(--end-top);
                transform: rotate(var(--mid-rotation)) scale(1);
            }
            85% {
                transform: rotate(var(--end-rotation)) scale(1.02);
            }
            100% {
                top: var(--end-top);
                transform: rotate(var(--end-rotation)) scale(1);
                opacity: 1;
            }
        }

        .close-animation {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 1.5rem;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 8px;
            z-index: 1001;
        }

        .close-animation:hover {
            background: rgba(255,255,255,0.3);
        }
    </style>
</head>

    <div class="slide-counter">

    <script>
        // Load saved slide position or start at 0
        let currentSlide = parseInt(localStorage.getItem('currentSlide')) || 0;
        const slides = document.querySelectorAll('.slide');
        const totalSlides = slides.length;

        // Make sure saved position is valid
        if (currentSlide >= totalSlides) currentSlide = 0;

        document.getElementById('totalSlides').textContent = totalSlides;

        // Show the saved slide on load (no animation)
        slides[currentSlide].style.transition = 'none';
        slides[currentSlide].classList.add('active');
        document.getElementById('currentSlide').textContent = currentSlide + 1;
        document.getElementById('progressBar').style.width = ((currentSlide + 1) / totalSlides * 100) + '%';
        // Re-enable transitions after initial load
        setTimeout(() => {
            slides[currentSlide].style.transition = '';
        }, 50);

        function showSlide(n) {
            const prevSlide = currentSlide;
            currentSlide = (n + totalSlides) % totalSlides;

            // Keep previous slide visible underneath
            slides[prevSlide].classList.remove('active');
            slides[prevSlide].classList.add('underneath');

            // Bring new slide on top
            slides[currentSlide].classList.add('active');

            // Remove underneath class after animation
            setTimeout(() => {
                slides[prevSlide].classList.remove('underneath');
            }, 600);

            document.getElementById('currentSlide').textContent = currentSlide + 1;
            document.getElementById('progressBar').style.width = ((currentSlide + 1) / totalSlides * 100) + '%';
            // Save position to localStorage
            localStorage.setItem('currentSlide', currentSlide);
        }

        function changeSlide(direction) {
            showSlide(currentSlide + direction);
        }

        // Auto-refresh every 30 seconds to pick up image changes
        let autoRefreshTimer = setTimeout(() => {
            location.reload();
        }, 30000);

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') {
                changeSlide(1);
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                changeSlide(-1);
            } else if (e.key === 'f' || e.key === 'F') {
                toggleFullscreen();
            } else if (e.key === 'Home') {
                showSlide(0);
            } else if (e.key === 'End') {
                showSlide(totalSlides - 1);
            }
        });

        // Touch/swipe support
        let touchStartX = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        });

        document.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const diff = touchStartX - touchEndX;
            if (Math.abs(diff) > 50) {
                changeSlide(diff > 0 ? 1 : -1);
            }
        });

        // Animation Mode
        let animationMode = false;
        let animationInterval = null;
        let animationIndex = 0;

        // Disable auto-refresh when in animation mode
        function disableAutoRefresh() {
            if (autoRefreshTimer) {
                clearTimeout(autoRefreshTimer);
                autoRefreshTimer = null;
            }
        }

        // Re-enable auto-refresh
        function enableAutoRefresh() {
            autoRefreshTimer = setTimeout(() => {
                location.reload();
            }, 30000);
        }

        // Get all image sources from slides
        function getImageSources() {
            const images = document.querySelectorAll('.slide img');
            return Array.from(images).map(img => img.src);
        }

        function createFallingPhoto(imgSrc) {
            const overlay = document.getElementById('animationOverlay');
            const photo = document.createElement('div');
            photo.className = 'falling-photo';

            const img = document.createElement('img');
            img.src = imgSrc;
            photo.appendChild(img);

            // Random position and rotation
            const startRotation = (Math.random() - 0.5) * 60;
            const midRotation = (Math.random() - 0.5) * 30;
            const endRotation = (Math.random() - 0.5) * 25;
            const leftPos = 5 + Math.random() * 70;
            const endTop = 30 + Math.random() * 40;

            photo.style.left = leftPos + '%';
            photo.style.setProperty('--start-rotation', startRotation + 'deg');
            photo.style.setProperty('--mid-rotation', midRotation + 'deg');
            photo.style.setProperty('--end-rotation', endRotation + 'deg');
            photo.style.setProperty('--end-top', endTop + '%');

            overlay.appendChild(photo);

            // Remove old photos if too many
            const photos = overlay.querySelectorAll('.falling-photo');
            if (photos.length > 15) {
                photos[0].remove();
            }
        }

        function toggleAnimationMode() {
            if (animationMode) {
                stopAnimationMode();
            } else {
                startAnimationMode();
            }
        }

        function startAnimationMode() {
            animationMode = true;
            animationIndex = 0;
            disableAutoRefresh();

            const overlay = document.getElementById('animationOverlay');
            const btn = document.querySelector('.animation-btn');

            overlay.classList.add('active');
            btn.classList.add('active');
            btn.textContent = '⏸';

            const images = getImageSources();

            // Drop a photo every 1.5 seconds
            animationInterval = setInterval(() => {
                if (animationIndex < images.length) {
                    createFallingPhoto(images[animationIndex]);
                    animationIndex++;
                } else {
                    // Loop back to start
                    animationIndex = 0;
                    // Clear old photos
                    const photos = overlay.querySelectorAll('.falling-photo');
                    photos.forEach(p => p.remove());
                }
            }, 1500);
        }

        function stopAnimationMode() {
            animationMode = false;

            if (animationInterval) {
                clearInterval(animationInterval);
                animationInterval = null;
            }

            const overlay = document.getElementById('animationOverlay');
            const btn = document.querySelector('.animation-btn');

            overlay.classList.remove('active');
            btn.classList.remove('active');
            btn.textContent = '▶';

            // Clear all photos
            const photos = overlay.querySelectorAll('.falling-photo');
            photos.forEach(p => p.remove());

            enableAutoRefresh();
        }

        // Press Escape to exit animation mode
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && animationMode) {
                stopAnimationMode();
            }
        });
    </script>
